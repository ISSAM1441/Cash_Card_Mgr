########################################################################################################################
# This file contains the configuration of the Family Cash Card
########################################################################################################################

spring.application.name=family-cash-card
#logging.level.root=DEBUG
#logging.level.org.flywaydb=TRACE
#logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
#-----------------------------------------------------------------------------------------------------------------------
# Tomcat configuration
#-----------------------------------------------------------------------------------------------------------------------
server.port=${FCC_SERVER_PORT:60055}
server.servlet.context-path=/cash
server.shutdown=graceful
# For the search of key files, we need to add " as relaxed char in addition to the default ones.
server.tomcat.relaxed-query-chars=<, >, [, \\, ], ^, `, {, |, }, "
# Maximum queue length for incoming connection requests when all possible request processing threads are in use.
server.tomcat.accept-count=0
# Maximum amount of worker threads (also called request processing threads)
server.tomcat.threads.max=5
# Minimum amount of worker threads (also called request processing threads)
server.tomcat.threads.min-spare=5
# Maximum number of connections that the server accepts and processes at any given time.
# Once the limit has been reached, the operating system may still accept connections based on the "acceptCount" property.
server.tomcat.max-connections=200
# Redirects Tomcat's working directory away from C:\WINDOWS to your project's build folder
server.tomcat.basedir=${user.dir}/build/tomcat

#-----------------------------------------------------------------------------------------------------------------------
# MVC configuration
#-----------------------------------------------------------------------------------------------------------------------
spring.mvc.formcontent.filter.enabled=false

#-----------------------------------------------------------------------------------------------------------------------
# Jackson configuration
#-----------------------------------------------------------------------------------------------------------------------
# Omits null values completely from output JSON strings to minimize network payload sizing costs
spring.jackson.default-property-inclusion=non_null

# Global date formatting masks (leveraged safely by Jackson 3 engine structures)
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
spring.jackson.time-zone=UTC
spring.jackson.locale=US

# REMOVED due to Jackson 3 breaking enum structural changes:
#spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
#spring.jackson.deserialization.FAIL_ON_INVALID_SUBTYPE=false
#spring.jackson.deserialization.FAIL_ON_MISSING_EXTERNAL_TYPE_ID_PROPERTY=false
#spring.jackson.mapper.ACCEPT_CASE_INSENSITIVE_ENUMS=true

#-----------------------------------------------------------------------------------------------------------------------
# FlywayDatabase Migrations Configuration
#-----------------------------------------------------------------------------------------------------------------------
# Enables Flyway execution during the Spring context initialization sequence phase
spring.flyway.enabled=true

# Security Isolation: Restricts Flyway metadata table operations to a dedicated schema scope
spring.flyway.default-schema=${FCC_SCHEMA_OWNER:fcc}
spring.flyway.schemas=${spring.flyway.default-schema}
# Dynamic Script Placeholders: Injected straight into your .sql scripts at runtime
spring.flyway.placeholders.schema_name=${spring.flyway.default-schema}

spring.flyway.placeholders.role-rw=${spring.datasource.username}

# Force Flyway to run even when spring.sql.init is active
spring.flyway.baseline-on-migrate=false

spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.sql.init.username}
spring.flyway.password=${spring.sql.init.password}

# Flyway Migration Credentials (using the database user context)
spring.flyway.placeholders.flyway_user=${FLYWAY_USERNAME:fcc}
spring.flyway.placeholders.flyway_password=${FLYWAY_PASSWORD:fcc}
spring.flyway.placeholders.app_user=${DB_USERNAME:db_user}
spring.flyway.placeholders.app_password=${DB_PASSWORD:fcc}

#-----------------------------------------------------------------------------------------------------------------------
# Database Connection (Spring Data JDBC / PostgreSQL)
#-----------------------------------------------------------------------------------------------------------------------
# Appended UTC timezone requirement natively via PostgreSQL driver connection options
spring.datasource.url=jdbc:postgresql://${FCC_DATABASE_HOST:localhost}:${FCC_DATABASE_PORT:5432}/${FCC_DATABASE:fcc}
# Database connection credentials
spring.datasource.username=${DB_USERNAME:fcc}
spring.datasource.password=${DB_PASSWORD:fcc}

# ----------------------------------------------------------------------------------------------------------------------
# Spring Boot Database Initialization (Runs BEFORE Flyway)
# ----------------------------------------------------------------------------------------------------------------------
# Tells Spring Boot to explicitly run schema.sql against your database instance
spring.sql.init.mode=never
spring.sql.init.platform=postgresql
spring.sql.init.separator=;
spring.sql.init.encoding=UTF-8

# CRITICAL: The initializer must connect as 'postgres' admin to have permission to create roles
spring.sql.init.username=${SPRING_INIT_DB_USER:postgres}
spring.sql.init.password=${SPRING_INIT_DB_PASSWORD:postgres}

# Prevent Spring Boot's basic initializer from wrestling with Flyway over scripts execution order
spring.sql.init.continue-on-error=false

#-----------------------------------------------------------------------------------------------------------------------
# JPA configuration
#-----------------------------------------------------------------------------------------------------------------------
# Tell Hibernate how to start: 'validate' request the check of the entities against the tables
spring.jpa.hibernate.ddl-auto=validate
# Log the executed SQL statement / Keep Hibernate logs clean in production
spring.jpa.show-sql=false
# Disable Open Session in View to protect your tight connection pool from leakages
spring.jpa.open-in-view=false
# Without providing this property, the JDBC Driver might convert the provided timestamp values from the JVM time zone to the database timezone.
# Let Hibernate handle time zone normalization explicitly at the framework level
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC';
# Database maximum amount of open connection (idle and active together)
spring.datasource.hikari.maximum-pool-size=5
# Database minimum idle connection amount, if less available, best effort made to open more until maximumPoolSize
spring.datasource.hikari.minimum-idle=5
# Database maximum time (in milliseconds) to get a connection, otherwise, SQLException
spring.datasource.hikari.connection-timeout=30000
# Database longest connection time (in milliseconds) usage before a warning for possible connection leak is logged
spring.datasource.hikari.leak-detection-threshold=300000
# This property controls the maximum lifetime of a connection in the pool. When a connection reaches this
# timeout, even if recently used, it will be retired from the pool. An in-use connection will never be
# retired, only when it is idle will it be removed.
# The maximum connection lifetime in milliseconds. It should be lower than the database wait timeout
spring.datasource.hikari.max-lifetime=300000

#-----------------------------------------------------------------------------------------------------------------------
# Application frameworks configuration
#-----------------------------------------------------------------------------------------------------------------------
application.frameworks.error.whitelabel.disabled=false
application.frameworks.namespace=com.shieldguard.csdps.sbcc.famillycashcard
application.frameworks.name=family-cash-card
application.frameworks.security.enabled=${SECURITY_ENABLED:true}
#application.frameworks.security.policy.endpoint=

#-----------------------------------------------------------------------------------------------------------------------
# Task scheduling configuration
#-----------------------------------------------------------------------------------------------------------------------
spring.task.scheduling.pool.size=3

#-----------------------------------------------------------------------------------------------------------------------
# Reporting interval configuration
#-----------------------------------------------------------------------------------------------------------------------
fcc.reporting-scheduler.polling-interval=${REPORTING_POLLING_INTERVAL:PT1H}
fcc.reporting-scheduler.initial-delay-interval=PT10S

#-----------------------------------------------------------------------------------------------------------------------
# Data retention configuration
#-----------------------------------------------------------------------------------------------------------------------
fcc.data-retention.scheduler.cron-expression=${DATA_RETENTION_SCHEDULE:0 0 22 * * ?}
fcc.data-retention.scheduler.lock-at-most-for=${DATA_RETENTION_SCHEDULER_LOCK_AT_MOST_FOR:PT23H59M59S}
fcc.data-retention.scheduler.lock-at-least-for=${DATA_RETENTION_SCHEDULER_LOCK_AT_LEAST_FOR:PT23H59M59S}
fcc.data-retention.deleted-key-retention-period=P6M
fcc.data-retention.off-boarded-key-retention-period=P2Y
fcc.data-retention.outbox-message-retention-period=P2W
fcc.data-retention.key-request-retention-period=P6M
fcc.data-retention.scheduler.polling-interval=24h
fcc.data-retention.scheduler.initial-delay-interval=2m
fcc.data-retention.expired-key-cryptogram-deletion-batch-size=${EXPIRED_CASH_CARD_DELETION_BATCH_SIZE:100}

#-----------------------------------------------------------------------------------------------------------------------
# Audit logging configuration
#-----------------------------------------------------------------------------------------------------------------------
cashcard.audit.logging.app-name=${spring.application.name}
cashcard.audit.logging.esf-program-name=Cryptographic Security
cashcard.audit.logging.esf-service-name=CASHCARD
cashcard.audit.logging.location=${AXON_TOPIC_ZONE}
cashcard.audit.logging.integration-type=${AUDIT_INTEGRATION_TYPE:simple}

#-----------------------------------------------------------------------------------------------------------------------
# SpringBoot endpoints configuration
#-----------------------------------------------------------------------------------------------------------------------
# Base path for management endpoint
management.endpoints.web.base-path=/
# Disable all endpoints
management.endpoints.access.default=none
# Enable info endpoint
management.endpoint.info.access=read_only
# Enable health endpoint
management.endpoint.health.access=read_only
# Enable metrics endpoint
management.endpoint.metrics.access=read_only
# Enable custom business metrics only
management.metrics.enable.all=false
management.metrics.enable.pks=true
# Disable health diskspace health
management.health.diskspace.enabled=false
# Expose health details
management.endpoint.health.show-details=always
# Enable scheduledtasks endpoint
management.endpoint.scheduledtasks.access=read_only
# Allow to display the full or simple git information
management.info.git.mode=simple
# Allow endpoints to be accessed without requiring authentication
# Production recommendation: explicitly naming allowed endpoints
management.endpoints.web.exposure.include=info,health,metrics,scheduledtasks